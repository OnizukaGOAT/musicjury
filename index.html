<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MusicJury</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #141418;
    --card: #1a1a20;
    --border: #2a2a35;
    --accent: #f0c040;
    --accent2: #e05a30;
    --text: #f0ede8;
    --muted: #7a7880;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 15% 10%, #1e1a0e 0%, transparent 50%),
      radial-gradient(ellipse at 85% 85%, #120d0a 0%, transparent 50%);
  }

  header {
    padding: 1.4rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    color: var(--accent);
    letter-spacing: 0.05em;
    line-height: 1;
  }
  .logo span { color: var(--accent2); }

  .tabs { display: flex; gap: 8px; }
  .tab {
    padding: 0.45rem 1.1rem;
    border-radius: 2rem;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    transition: all 0.2s;
  }
  .tab.active { background: var(--accent); color: #000; border-color: var(--accent); }

  main { max-width: 900px; margin: 0 auto; padding: 2rem; }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.08em;
    color: var(--accent);
    margin-bottom: 1rem;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.2rem 1.4rem;
    margin-bottom: 1rem;
  }

  input[type="text"], input[type="url"], input[type="password"] {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    padding: 0.6rem 1rem;
    outline: none;
    width: 100%;
    transition: border-color 0.2s;
  }
  input:focus { border-color: var(--accent); }

  label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 4px; }

  .btn {
    padding: 0.6rem 1.3rem;
    border-radius: 8px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: #ffd050; }
  .btn-danger { background: transparent; color: var(--accent2); border: 1px solid var(--accent2); font-size: 0.8rem; padding: 0.3rem 0.7rem; }
  .btn-danger:hover { background: var(--accent2); color: #fff; }

  .add-grid {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 10px;
    align-items: end;
  }
  @media(max-width:600px) { .add-grid { grid-template-columns: 1fr; } }

  /* Sort bar */
  .sort-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 1.2rem;
    flex-wrap: wrap;
  }
  .sort-bar span { color: var(--muted); font-size: 13px; }
  .sort-btn {
    padding: 0.3rem 0.85rem;
    border-radius: 2rem;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    transition: all 0.2s;
  }
  .sort-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }

  /* Song cards - vote mode */
  .song-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 1rem;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .song-card:hover { border-color: #3a3a50; }
  .song-card.expanded { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); margin-bottom: 1.5rem; }

  /* Collapsed header (always visible) */
  .song-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0.65rem 1rem;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }
  .song-header:hover { background: rgba(255,255,255,0.03); }
  .song-thumb-small {
    width: 72px;
    height: 48px;
    object-fit: cover;
    border-radius: 7px;
    flex-shrink: 0;
    background: var(--border);
  }
  .song-header-title {
    flex: 1;
    font-weight: 500;
    font-size: 0.95rem;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .song-header-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .song-header-avg {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    color: var(--accent);
  }
  .song-chevron {
    color: var(--muted);
    font-size: 12px;
    transition: transform 0.3s;
    line-height: 1;
  }
  .song-card.expanded .song-chevron { transform: rotate(180deg); }

  /* Expandable body */
  .song-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .song-card.expanded .song-body { max-height: 900px; }

  /* Video embed */
  .video-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
  }
  .video-wrap iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }
  .thumb-wrap {
    position: relative;
    display: block;
    text-decoration: none;
    background: #000;
    cursor: pointer;
  }
  .thumb-wrap img {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    display: block;
    transition: opacity 0.2s;
  }
  .thumb-wrap:hover img { opacity: 0.85; }
  .thumb-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.05) 50%, transparent 100%);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 1rem;
  }
  .play-btn {
    align-self: center;
    width: 60px; height: 60px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(6px);
    border: 2px solid rgba(255,255,255,0.4);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; color: #fff;
    padding-left: 4px;
    transition: background 0.2s, transform 0.2s;
  }
  .thumb-wrap:hover .play-btn { background: rgba(255,255,255,0.25); transform: scale(1.1); }
  .thumb-title { color: #fff; font-weight: 600; font-size: 1rem; text-shadow: 0 1px 4px rgba(0,0,0,0.9); }

  .vote-area {
    padding: 1rem 1.2rem;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }
  .vote-label { color: var(--muted); font-size: 13px; }

  .stars { display: flex; gap: 4px; }
  .star {
    font-size: 28px;
    cursor: pointer;
    color: var(--border);
    transition: color 0.12s, transform 0.1s;
    line-height: 1;
    user-select: none;
  }
  .star.lit { color: var(--accent); }
  .star:hover { transform: scale(1.2); }

  .confirm { color: #4caf50; font-size: 13px; font-weight: 600; opacity: 0; transition: opacity 0.3s; }
  .confirm.show { opacity: 1; }

  .results-bar {
    padding: 0.75rem 1.2rem;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    background: var(--surface);
    font-size: 13px;
  }
  .rater { color: var(--muted); }
  .rater strong { color: var(--accent); }
  .avg-badge {
    margin-left: auto;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  /* Song cards - admin mode */
  .admin-song {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  .admin-thumb {
    width: 80px; height: 54px;
    object-fit: cover;
    border-radius: 8px;
    flex-shrink: 0;
    background: var(--border);
  }
  .admin-info { flex: 1; min-width: 120px; }
  .admin-info .title { font-weight: 500; margin-bottom: 3px; }
  .admin-info a { color: var(--muted); font-size: 12px; text-decoration: none; }
  .admin-ratings { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; min-width: 110px; }
  .score-badge { background: var(--accent); color: #000; border-radius: 4px; padding: 0 5px; font-weight: 700; font-size: 13px; }
  .avg-big { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; color: var(--accent); line-height: 1; }

  /* Admin login */
  .login-box { max-width: 340px; margin: 4rem auto; text-align: center; }
  .lock-icon { font-size: 48px; margin-bottom: 12px; }
  .error-msg { color: var(--accent2); font-size: 13px; margin-bottom: 8px; }

  .voter-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }
  .voter-bar label { white-space: nowrap; margin-bottom: 0; }
  .voter-bar input { max-width: 220px; }
  .voter-bar .hint { color: var(--muted); font-size: 12px; }

  .empty { text-align: center; padding: 3rem 1rem; color: var(--muted); font-style: italic; }
  .saving { font-size: 12px; color: var(--muted); margin-left: 12px; }

  #panel-vote, #panel-admin, #panel-login { display: none; }
  #panel-vote.active, #panel-admin.active, #panel-login.active { display: block; }
</style>
</head>
<body>

<header>
  <div class="logo">Music<span>Jury</span> <span class="saving" id="saving-indicator"></span></div>
  <div class="tabs">
    <button class="tab active" id="tab-vote" onclick="showPanel('vote')">&#127925; Votar</button>
    <button class="tab" id="tab-admin" onclick="showPanel('admin')">&#127923; Admin</button>
  </div>
</header>

<main>

  <!-- VOTE PANEL -->
  <div id="panel-vote" class="active">
    <div class="card voter-bar">
      <label>Tu nombre:</label>
      <input type="text" id="voter-name" placeholder="Escribe tu nombre..." oninput="onVoterNameChange()">
      <span class="hint">Los votos se guardan automaticamente</span>
    </div>
    <div class="sort-bar">
      <span>Ordenar por:</span>
      <button class="sort-btn active" id="sort-btn-default" onclick="setSort('default')">Orden original</button>
      <button class="sort-btn" id="sort-btn-avg" onclick="setSort('avg')">&#11088; Puntuacion</button>
      <button class="sort-btn" id="sort-btn-votes" onclick="setSort('votes')">&#128101; Num. votos</button>
    </div>
    <div id="vote-list"><p class="empty">El admin aun no ha anadido canciones.</p></div>
  </div>

  <!-- ADMIN LOGIN -->
  <div id="panel-login">
    <div class="card login-box">
      <div class="lock-icon">&#128274;</div>
      <div class="section-title" style="margin-bottom:1rem">Acceso Admin</div>
      <input type="password" id="admin-pw-input" placeholder="Contrasena" onkeydown="if(event.key==='Enter')tryLogin()" style="margin-bottom:10px">
      <p class="error-msg" id="login-error" style="display:none">Contrasena incorrecta</p>
      <button class="btn btn-primary" style="width:100%;padding:.7rem;margin-top:4px" onclick="tryLogin()">Entrar</button>
    </div>
  </div>

  <!-- ADMIN PANEL -->
  <div id="panel-admin">
    <div class="section-title">Anadir cancion</div>
    <div class="card">
      <div class="add-grid">
        <div>
          <label>Titulo</label>
          <input type="text" id="new-title" placeholder="Ej: Arctic Monkeys - Do I Wanna Know">
        </div>
        <div>
          <label>URL de YouTube</label>
          <input type="url" id="new-url" placeholder="https://youtube.com/watch?v=..." onkeydown="if(event.key==='Enter')addSong()">
        </div>
        <button class="btn btn-primary" onclick="addSong()">Anadir</button>
      </div>
    </div>

    <div class="section-title">Canciones y resultados</div>
    <div id="admin-list"><p class="empty">Aun no hay canciones.</p></div>
  </div>

</main>

<script>
// ============================================
//  CONFIGURACION
// ============================================
const ADMIN_PASSWORD    = "dj1234";   // <- cambia esto
const JSONBIN_ACCESS_KEY = "$2a$10$TpycarrmqR3pdoKdcSibHe8biWP1rSIIJZH4WP3zmZnZUrvzE4np.";
const JSONBIN_BIN_ID    = "6a1971f4ddf5aa59f773d3e4";         // <- dejar vacio la primera vez

// ============================================
//  ESTADO
// ============================================
let songs         = [];
let ratings       = {};
let sortMode      = "default";
let binId         = localStorage.getItem("mj_bin_id") || JSONBIN_BIN_ID;
let adminUnlocked = false;

// ============================================
//  JSONBIN API
// ============================================
async function loadData() {
  try {
    if (!binId) { await createBin(); return; }
    const res = await fetch("https://api.jsonbin.io/v3/b/" + binId + "/latest", {
      headers: { "X-Access-Key": JSONBIN_ACCESS_KEY }
    });
    if (!res.ok) throw new Error("Load failed");
    const json = await res.json();
    songs   = json.record.songs   || [];
    ratings = json.record.ratings || {};
    renderAll();
  } catch(e) { console.error("loadData error:", e); }
}

async function saveData() {
  setSaving(true);
  try {
    if (!binId) { await createBin(); return; }
    await fetch("https://api.jsonbin.io/v3/b/" + binId, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json",
        "X-Access-Key": JSONBIN_ACCESS_KEY
      },
      body: JSON.stringify({ songs: songs, ratings: ratings })
    });
  } catch(e) { console.error("saveData error:", e); }
  setSaving(false);
}

async function createBin() {
  setSaving(true);
  try {
    const res = await fetch("https://api.jsonbin.io/v3/b", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-Access-Key": JSONBIN_ACCESS_KEY,
        "X-Bin-Name": "musicjury-data",
        "X-Bin-Private": "true"
      },
      body: JSON.stringify({ songs: [], ratings: {} })
    });
    const json = await res.json();
    binId = json.metadata.id;
    localStorage.setItem("mj_bin_id", binId);
    songs   = [];
    ratings = {};
    renderAll();
    alert("Base de datos creada. ID: " + binId + "\n\nGuardalo por si acaso.");
  } catch(e) { alert("Error creando la base de datos: " + e.message); }
  setSaving(false);
}

// ============================================
//  HELPERS
// ============================================
function getYTId(url) {
  const m = url.match(/(?:v=|youtu\.be\/|embed\/|shorts\/)([A-Za-z0-9_-]{11})/);
  return m ? m[1] : null;
}
function getAvg(sr) {
  const vals = Object.values(sr || {});
  if (!vals.length) return null;
  return (vals.reduce(function(a,b){return a+b;}, 0) / vals.length).toFixed(1);
}
function getVoteCount(sr) { return Object.keys(sr || {}).length; }
function setSaving(on) {
  document.getElementById("saving-indicator").textContent = on ? "guardando..." : "";
}

// ============================================
//  SORT
// ============================================
function setSort(mode) {
  sortMode = mode;
  ["default","avg","votes"].forEach(function(m) {
    document.getElementById("sort-btn-" + m).classList.toggle("active", m === mode);
  });
  renderVoteList();
}

function getSortedSongs() {
  var list = songs.slice();
  if (sortMode === "avg") {
    list.sort(function(a, b) {
      var avgA = parseFloat(getAvg(ratings[a.id])) || 0;
      var avgB = parseFloat(getAvg(ratings[b.id])) || 0;
      return avgB - avgA;
    });
  } else if (sortMode === "votes") {
    list.sort(function(a, b) {
      return getVoteCount(ratings[b.id]) - getVoteCount(ratings[a.id]);
    });
  }
  return list;
}

// ============================================
//  SONGS
// ============================================
async function addSong() {
  var title = document.getElementById("new-title").value.trim();
  var url   = document.getElementById("new-url").value.trim();
  if (!title) { alert("Escribe un titulo"); return; }
  var ytId = getYTId(url);
  if (!ytId) { alert("URL de YouTube no valida"); return; }
  songs.push({ id: Date.now().toString(), title: title, ytId: ytId });
  document.getElementById("new-title").value = "";
  document.getElementById("new-url").value   = "";
  renderAll();
  await saveData();
}

async function deleteSong(id) {
  if (!confirm("Eliminar esta cancion?")) return;
  songs = songs.filter(function(s){ return s.id !== id; });
  delete ratings[id];
  renderAll();
  await saveData();
}

// ============================================
//  RATINGS
// ============================================
async function vote(songId, score) {
  var voter = document.getElementById("voter-name").value.trim();
  if (!voter) { alert("Escribe tu nombre antes de votar!"); return; }
  if (!ratings[songId]) ratings[songId] = {};
  ratings[songId][voter] = score;
  renderVoteList();
  renderAdminList();
  var el = document.getElementById("confirm-" + songId);
  if (el) { el.classList.add("show"); setTimeout(function(){ el.classList.remove("show"); }, 1500); }
  await saveData();
}

// ============================================
//  RENDER
// ============================================
function renderAll() {
  renderVoteList();
  renderAdminList();
}

function toggleCard(songId) {
  var card = document.getElementById("card-" + songId);
  var wasExpanded = card.classList.contains("expanded");
  document.querySelectorAll(".song-card.expanded").forEach(function(c) {
    c.classList.remove("expanded");
    var vw = c.querySelector(".video-wrap");
    if (vw) vw.innerHTML = "";
  });
  if (!wasExpanded) {
    card.classList.add("expanded");
    var vw = card.querySelector(".video-wrap");
    var ytId = card.dataset.ytid;
    if (vw && ytId) {
      vw.innerHTML = '<iframe src="https://www.youtube.com/embed/' + ytId + '?autoplay=1&rel=0" allow="autoplay; encrypted-media" allowfullscreen></iframe>';
    }
    setTimeout(function() { card.scrollIntoView({ behavior: "smooth", block: "nearest" }); }, 50);
  }
}

function renderVoteList() {
  var voter = document.getElementById("voter-name").value.trim();
  var el = document.getElementById("vote-list");
  if (!songs.length) { el.innerHTML = '<p class="empty">El admin aun no ha anadido canciones.</p>'; return; }

  var sorted = getSortedSongs();

  el.innerHTML = sorted.map(function(song) {
    var sr = ratings[song.id] || {};
    var myScore = (voter && sr[voter]) ? sr[voter] : 0;
    var avg = getAvg(sr);
    var voters = Object.entries(sr);

    var stars = [1,2,3,4,5].map(function(n) {
      return '<span class="star ' + (n <= myScore ? 'lit' : '') + '"' +
        ' onclick="event.stopPropagation();vote(\'' + song.id + '\',' + n + ')"' +
        ' onmouseover="hoverStars(\'' + song.id + '\',' + n + ')"' +
        ' onmouseout="unhoverStars(\'' + song.id + '\',' + myScore + ')"' +
        ' data-song="' + song.id + '" data-val="' + n + '">&#9733;</span>';
    }).join("");

    var voterHtml = voters.length
      ? voters.map(function(e){ return '<span class="rater">' + e[0] + ': <strong>' + e[1] + '&#9733;</strong></span>'; }).join("")
      : '<span class="rater">Nadie ha votado aun</span>';

    var rankLabel = "";
    if (sortMode === "avg" && avg !== null) {
      var pos = getSortedSongs().indexOf(song) + 1;
      rankLabel = '<span style="background:var(--accent);color:#000;font-family:\'Bebas Neue\',sans-serif;font-size:1rem;padding:2px 8px;border-radius:4px;margin-right:6px">#' + pos + '</span>';
    }

    var myStarHtml = myScore ? '<span style="color:var(--accent);font-size:13px">&#9733;' + myScore + '</span>' : '';

    return '<div class="song-card" id="card-' + song.id + '" data-ytid="' + song.ytId + '">' +
      '<div class="song-header" onclick="toggleCard(\'' + song.id + '\')">' +
        '<img class="song-thumb-small"' +
          ' src="https://img.youtube.com/vi/' + song.ytId + '/mqdefault.jpg"' +
          ' onerror="this.src=\'https://img.youtube.com/vi/' + song.ytId + '/0.jpg\'"' +
          ' alt="' + song.title + '">' +
        '<span class="song-header-title">' + rankLabel + song.title + '</span>' +
        '<div class="song-header-meta">' +
          myStarHtml +
          (avg !== null ? '<span class="song-header-avg">' + avg + '&#9733;</span>' : '') +
          '<span class="song-chevron">&#9660;</span>' +
        '</div>' +
      '</div>' +
      '<div class="song-body">' +
        '<div class="video-wrap"></div>' +
        '<div class="vote-area">' +
          '<span class="vote-label">Tu voto:</span>' +
          '<div class="stars" id="stars-' + song.id + '">' + stars + '</div>' +
          '<span class="confirm" id="confirm-' + song.id + '">&#10003; Guardado</span>' +
        '</div>' +
        '<div class="results-bar">' +
          voterHtml +
          (avg !== null ? '<span class="avg-badge">Media: ' + avg + '</span>' : '') +
        '</div>' +
      '</div>' +
    '</div>';
  }).join("");
}

function renderAdminList() {
  var el = document.getElementById("admin-list");
  if (!songs.length) { el.innerHTML = '<p class="empty">Aun no hay canciones.</p>'; return; }

  el.innerHTML = songs.map(function(song) {
    var sr = ratings[song.id] || {};
    var avg = getAvg(sr);
    var raterRows = Object.entries(sr).map(function(e) {
      return '<div style="display:flex;gap:6px;align-items:center">' +
        '<span style="color:var(--muted);font-size:13px">' + e[0] + '</span>' +
        '<span class="score-badge">' + e[1] + '&#9733;</span>' +
      '</div>';
    }).join("");

    return '<div class="card admin-song">' +
      '<img class="admin-thumb"' +
        ' src="https://img.youtube.com/vi/' + song.ytId + '/mqdefault.jpg"' +
        ' onerror="this.src=\'https://img.youtube.com/vi/' + song.ytId + '/0.jpg\'"' +
        ' alt="">' +
      '<div class="admin-info">' +
        '<div class="title">' + song.title + '</div>' +
        '<a href="https://www.youtube.com/watch?v=' + song.ytId + '" target="_blank">youtu.be/' + song.ytId + '</a>' +
      '</div>' +
      '<div class="admin-ratings">' +
        (avg !== null
          ? '<div class="avg-big">' + avg + ' &#9733;</div><div style="color:var(--muted);font-size:12px">' + Object.keys(sr).length + ' voto(s)</div>'
          : '<div style="color:var(--muted);font-size:13px">Sin votos</div>') +
        raterRows +
      '</div>' +
      '<button class="btn btn-danger" onclick="deleteSong(\'' + song.id + '\')">Eliminar</button>' +
    '</div>';
  }).join("");
}

// ============================================
//  STARS HOVER
// ============================================
function hoverStars(songId, val) {
  document.querySelectorAll('[data-song="' + songId + '"]').forEach(function(s) {
    s.classList.toggle("lit", parseInt(s.dataset.val) <= val);
  });
}
function unhoverStars(songId, current) {
  document.querySelectorAll('[data-song="' + songId + '"]').forEach(function(s) {
    s.classList.toggle("lit", parseInt(s.dataset.val) <= current);
  });
}

// ============================================
//  PANELS / AUTH
// ============================================
function showPanel(name) {
  if (name === "admin" && !adminUnlocked) { name = "login"; }
  ["vote","admin","login"].forEach(function(p) {
    document.getElementById("panel-" + p).classList.toggle("active", p === name);
  });
  document.getElementById("tab-vote").classList.toggle("active", name === "vote");
  document.getElementById("tab-admin").classList.toggle("active", name === "admin" || name === "login");
}

function tryLogin() {
  var pw = document.getElementById("admin-pw-input").value;
  if (pw === ADMIN_PASSWORD) {
    adminUnlocked = true;
    document.getElementById("login-error").style.display = "none";
    showPanel("admin");
  } else {
    document.getElementById("login-error").style.display = "block";
  }
}

function onVoterNameChange() {
  localStorage.setItem("mj_voter", document.getElementById("voter-name").value.trim());
  renderVoteList();
}

// ============================================
//  INIT
// ============================================
document.getElementById("voter-name").value = localStorage.getItem("mj_voter") || "";
showPanel("vote");
loadData();
setInterval(loadData, 10000);
</script>
